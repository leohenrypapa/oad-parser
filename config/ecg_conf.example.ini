[Outputs]
output_json_file = /nsm/ecg/ecg-current.json
output_csv_file = /nsm/ecg/ecg.csv

[Options]
skip_headers = True
output_json = True
output_csv = False
check_range = True
check_altitude = True
check_azimuth = True
check_site_discovery = True
check_time_delta = True
check_fingerprint = True
output_status = False
siem_debug_evidence = False

[Live]
interface = eno1
mode = legacy_jsonl
rotation_enabled = False
rotate_seconds = 900
rotate_max_bytes = 536870912
receive_buffer_bytes = 134217728
status_interval_seconds = 60
metrics_interval_seconds = 60

[Storage]
output_dir = /nsm/ecg
prune_after_seconds = 43200
disk_high_water_percent = 75
disk_critical_percent = 95
block_when_full = True
compress_archives = False

[Audit]
audit_file = /var/log/oad-parser/ecg-audit.jsonl
status_file = /run/oad-parser/ecg-status.json

[Alerts]
# Optional explicit stateless alert policy. Leave empty to enable intrinsic alerts only.
alert_config_path =
