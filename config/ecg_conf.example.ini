[Outputs]
output_json_file = /nsm/ecg/ecg-current.json
output_csv_file = /nsm/ecg/ecg.csv

[Options]
skip_headers = True
output_json = True
output_csv = False
check_range = True
check_altitude = True
check_azimuth = True
check_site_discovery = True
check_time_delta = True
check_fingerprint = True
output_status = False
siem_debug_evidence = False

[Live]
interface = eno2
mode = legacy_jsonl
rotation_enabled = False
rotate_seconds = 900
rotate_max_bytes = 536870912
receive_buffer_bytes = 134217728
status_interval_seconds = 60
metrics_interval_seconds = 60
# Emit all actionable alert records but only one accepted/non-alert record per N records.
# Default 1000 keeps a bounded heartbeat/sample stream while preserving all actionable alerts.
normal_record_sample_rate = 1
# Keep accepted parse warnings in parser.validation.warnings without turning each one into a SIEM alert.
emit_parse_warning_alerts = True
# Keep non-cyber Mode C/altitude projection gaps out of SIEM alerts by default.
emit_modec_altitude_missing_alerts = True

[SIEM]
data_stream_type = logs
data_stream_dataset = radar.oad.new
event_dataset = radar.oad.new
service_name = oad-ecg-parser

[Storage]
output_dir = /nsm/ecg
prune_after_seconds = 43200
disk_high_water_percent = 75
disk_critical_percent = 95
block_when_full = True
compress_archives = False

[Audit]
audit_file = /var/log/oad-parser/ecg-audit.jsonl
status_file = /run/oad-parser/ecg-status.json

[Alerts]
# Optional explicit stateless alert policy. Leave empty to enable intrinsic alerts only.
alert_config_path =
