stages:
  - test

python-test:
  stage: test
  image: python:3.9
  before_script:
    - python -m pip install --upgrade pip
    - pip install poetry
    - poetry install
  script:
    - poetry run black --check oad_parser
    - poetry run pylint oad_parser
    - poetry run coverage run -m unittest discover -s oad_parser/tests -p "test_*.py"
    - poetry run coverage report
