stages:
  - verify

variables:
  # Manual/platform control: set this GitLab CI variable to an approved Registry1 image pinned by digest.
  # Example shape only: registry1.dso.mil/<approved-path>/<image>@sha256:<64-hex-digest>
  # Do not replace this with Docker Hub, a mutable tag, or an unapproved digest.
  OAD_PARSER_CI_IMAGE: ""

verify:
  stage: verify
  image:
    name: "$OAD_PARSER_CI_IMAGE"
  rules:
    - if: '$OAD_PARSER_CI_IMAGE =~ /^registry1\\.dso\\.mil\/.+@sha256:[0-9a-f]{64}$/'
      when: on_success
    - when: never
  script:
    - bash scripts/verify.sh
  artifacts:
    when: always
    expire_in: 14 days
    reports:
      junit: reports/tests/junit.xml
    paths:
      - reports/standards-verify-report.json
      - reports/tests/junit.xml
      - reports/validation/
      - reports/source-pack/source-pack-result.json
      - reports/source-pack/source-pack-manifest-check.json
